<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Banner Masterclass — 800x400</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #555; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  .banner {
    width: 800px;
    height: 400px;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    position: relative;
    overflow: hidden;
  }

  /* Linha dourada no topo */
  .banner::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: #C9A84C;
    z-index: 10;
  }

  /* ESQUERDA — texto fundo verde sólido */
  .lado-esquerdo {
    width: 390px;
    min-width: 390px;
    background: #1B3A2D;
    padding: 38px 40px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    z-index: 2;
  }

  .tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: #C9A84C;
    margin-bottom: 10px;
  }

  .titulo {
    font-size: 34px;
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 20px;
  }
  .titulo span { color: #C9A84C; }

  .infos {
    display: flex;
    gap: 24px;
    margin-bottom: 0;
  }
  .info-item { display: flex; flex-direction: column; gap: 2px; }
  .info-label {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.38);
  }
  .info-valor {
    font-size: 14px; font-weight: 700; color: #fff;
  }

  .rodape {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .apresentado {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    line-height: 1.6;
  }
  .apresentado strong { color: rgba(255,255,255,0.85); font-weight: 600; }

  .preco-bloco { text-align: right; }
  .preco-label {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.38);
    margin-bottom: 2px;
  }
  .preco-valor {
    font-size: 46px; font-weight: 800;
    color: #C9A84C; line-height: 1;
  }
  .preco-valor sup {
    font-size: 20px; font-weight: 600;
    vertical-align: super; margin-right: 1px;
  }

  /* DIREITA — foto */
  .lado-direito {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .lado-direito img {
    position: absolute;
    height: 100%;
    width: auto;
    top: 0;
    /* ajusta horizontalmente para centralizar os rostos */
    left: 50%;
    transform: translateX(-50%);
    object-fit: cover;
    filter: brightness(0.88);
  }

  /* Gradiente suave na borda esquerda da foto para fundir com o verde */
  .lado-direito::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 120px; height: 100%;
    background: linear-gradient(to right,
      #1B3A2D 0%,
      rgba(27,58,45,0.85) 30%,
      rgba(27,58,45,0.4) 60%,
      transparent 100%
    );
    z-index: 2;
  }

  /* Gradiente suave no rodapé da foto */
  .lado-direito::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50px;
    background: linear-gradient(to top, rgba(27,58,45,0.45), transparent);
    z-index: 2;
  }
</style>
</head>
<body>

<div class="banner">

  <div class="lado-esquerdo">
    <div>
      <div class="tag">Evento ao vivo · 26 de abril</div>
      <div class="titulo">Masterclass<br><span>Reconstrução<br>a Dois</span></div>
      <div class="infos">
        <div class="info-item">
          <span class="info-label">Data</span>
          <span class="info-valor">26 de abril</span>
        </div>
        <div class="info-item">
          <span class="info-label">Formato</span>
          <span class="info-valor">Ao vivo via Zoom</span>
        </div>
      </div>
    </div>

    <div class="rodape">
      <div class="apresentado">
        Com <strong>César Augusto</strong><br>e <strong>Thais Ayumi</strong>
      </div>
      <div class="preco-bloco">
        <div class="preco-label">Valor</div>
        <div class="preco-valor"><sup>R$</sup>97</div>
      </div>
    </div>
  </div>

  <div class="lado-direito">
    <img src="img/hero-casal.jpeg" alt="César e Thais">
  </div>

</div>

</body>
</html>
