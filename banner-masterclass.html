<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Banner Masterclass — 800x400</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #555; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  .banner {
    width: 800px;
    height: 400px;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    position: relative;
    overflow: hidden;
  }

  /* FOTO — ocupa o banner inteiro como fundo */
  .foto-bg {
    position: absolute;
    inset: 0;
    background-image: url('img/hero-casal.jpeg');
    background-size: cover;
    background-position: center top;
    filter: brightness(0.55);
  }

  /* Gradiente da esquerda para dar legibilidade ao texto */
  .gradiente {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to right,
      #1B3A2D 0%,
      #1B3A2D 42%,
      rgba(27,58,45,0.7) 62%,
      rgba(27,58,45,0.1) 100%
    );
    z-index: 1;
  }

  /* Linha dourada no topo */
  .linha-topo {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: #C9A84C;
    z-index: 3;
  }

  /* CONTEÚDO */
  .conteudo {
    position: relative;
    z-index: 2;
    padding: 38px 44px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 100%;
    width: 460px;
  }

  .topo { display: flex; flex-direction: column; gap: 0; }

  .tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: #C9A84C;
    margin-bottom: 12px;
  }

  .titulo {
    font-size: 36px;
    font-weight: 800;
    color: #fff;
    line-height: 1.08;
    margin-bottom: 22px;
  }
  .titulo span { color: #C9A84C; }

  .infos {
    display: flex;
    gap: 24px;
  }
  .info-item { display: flex; flex-direction: column; gap: 2px; }
  .info-label {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }
  .info-valor {
    font-size: 14px; font-weight: 700; color: #fff;
  }

  /* RODAPÉ do conteúdo */
  .rodape {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .apresentado {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    line-height: 1.5;
  }
  .apresentado strong { color: rgba(255,255,255,0.85); font-weight: 600; }

  .preco-bloco { text-align: right; }
  .preco-label {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 2px;
  }
  .preco-valor {
    font-size: 48px; font-weight: 800;
    color: #C9A84C; line-height: 1;
  }
  .preco-valor sup {
    font-size: 20px; font-weight: 600;
    vertical-align: super; margin-right: 1px;
  }
</style>
</head>
<body>

<div class="banner">
  <div class="foto-bg"></div>
  <div class="gradiente"></div>
  <div class="linha-topo"></div>

  <div class="conteudo">
    <div class="topo">
      <div class="tag">Evento ao vivo · 26 de abril</div>
      <div class="titulo">Masterclass<br><span>Reconstrução a Dois</span></div>
      <div class="infos">
        <div class="info-item">
          <span class="info-label">Data</span>
          <span class="info-valor">26 de abril</span>
        </div>
        <div class="info-item">
          <span class="info-label">Formato</span>
          <span class="info-valor">Ao vivo via Zoom</span>
        </div>
      </div>
    </div>

    <div class="rodape">
      <div class="apresentado">
        Com <strong>César Augusto</strong><br>e <strong>Thais Ayumi</strong>
      </div>
      <div class="preco-bloco">
        <div class="preco-label">Valor</div>
        <div class="preco-valor"><sup>R$</sup>97</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
