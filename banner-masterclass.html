<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner Masterclass — 800x400</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #888; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  .banner {
    width: 800px;
    height: 400px;
    background: #1B3A2D;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: row;
    position: relative;
    overflow: hidden;
  }

  /* Linha dourada no topo */
  .banner::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: #C9A84C;
    z-index: 10;
  }

  /* LADO ESQUERDO — texto */
  .lado-texto {
    width: 420px;
    min-width: 420px;
    padding: 40px 40px 36px 44px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 2;
  }

  .tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: #C9A84C;
    margin-bottom: 12px;
  }

  .titulo {
    font-size: 34px;
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 20px;
  }
  .titulo span { color: #C9A84C; }

  .infos {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
  }
  .info-item { display: flex; flex-direction: column; gap: 2px; }
  .info-label {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.38);
  }
  .info-valor {
    font-size: 14px; font-weight: 700; color: #fff;
  }

  .sep {
    width: 32px; height: 2px;
    background: #C9A84C; opacity: 0.5;
    margin-bottom: 18px;
  }

  .apresentado {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 0;
  }
  .apresentado strong { color: rgba(255,255,255,0.8); font-weight: 600; }

  /* PREÇO */
  .preco-bloco {
    position: absolute;
    left: 44px;
    bottom: 32px;
  }
  .preco-label {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 2px;
  }
  .preco-valor {
    font-size: 44px; font-weight: 800;
    color: #C9A84C; line-height: 1;
  }
  .preco-valor sup {
    font-size: 20px; font-weight: 600;
    vertical-align: super; margin-right: 1px;
  }

  /* LADO DIREITO — fotos */
  .lado-fotos {
    flex: 1;
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
  }

  /* Gradiente de transição esquerda */
  .lado-fotos::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 80px; height: 100%;
    background: linear-gradient(to right, #1B3A2D, transparent);
    z-index: 3;
  }

  .foto-wrapper {
    position: absolute;
    bottom: 0;
    height: 100%;
    display: flex;
    align-items: flex-end;
  }

  .foto-cesar {
    right: 200px;
    z-index: 2;
  }
  .foto-thais {
    right: 0;
    z-index: 1;
  }

  .foto-wrapper img {
    height: 380px;
    width: auto;
    object-fit: cover;
    object-position: top center;
    display: block;
    filter: brightness(0.92);
  }

  /* Gradiente no rodapé das fotos */
  .foto-wrapper::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(to top, #1B3A2D 0%, transparent 100%);
    z-index: 4;
  }

  /* Overlay escuro leve nas fotos */
  .foto-wrapper::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(27,58,45,0.15);
    z-index: 3;
  }

  /* Nome embaixo de cada foto */
  .nome-foto {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="banner">

  <!-- TEXTO -->
  <div class="lado-texto">
    <div class="tag">Evento ao vivo · 26 de abril</div>

    <div class="titulo">
      Masterclass<br>
      <span>Reconstrução<br>a Dois</span>
    </div>

    <div class="infos">
      <div class="info-item">
        <span class="info-label">Data</span>
        <span class="info-valor">26 de abril</span>
      </div>
      <div class="info-item">
        <span class="info-label">Formato</span>
        <span class="info-valor">Ao vivo via Zoom</span>
      </div>
    </div>

    <div class="sep"></div>

    <div class="apresentado">
      Com <strong>César Augusto</strong> e <strong>Thais Ayumi</strong>
    </div>

    <div class="preco-bloco">
      <div class="preco-label">Valor</div>
      <div class="preco-valor"><sup>R$</sup>97</div>
    </div>
  </div>

  <!-- FOTOS -->
  <div class="lado-fotos">
    <div class="foto-wrapper foto-cesar">
      <img src="img/IMG_3935.JPEG" alt="César Augusto">
      <span class="nome-foto">César Augusto</span>
    </div>
    <div class="foto-wrapper foto-thais">
      <img src="img/thais-retrato-2.jpg" alt="Thais Ayumi">
      <span class="nome-foto">Thais Ayumi</span>
    </div>
  </div>

</div>

</body>
</html>
