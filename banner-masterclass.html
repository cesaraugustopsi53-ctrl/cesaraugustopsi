<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner Masterclass — 800x400</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ccc; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  .banner {
    width: 800px;
    height: 400px;
    background: #1B3A2D;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px 56px;
    position: relative;
    overflow: hidden;
  }

  /* Detalhe decorativo */
  .banner::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: #C9A84C;
  }
  .banner::after {
    content: '';
    position: absolute;
    bottom: -80px; right: -80px;
    width: 320px; height: 320px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.1);
  }
  .circulo2 {
    position: absolute;
    bottom: -120px; right: -120px;
    width: 460px; height: 460px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.06);
  }

  .tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #C9A84C;
    margin-bottom: 14px;
  }

  .titulo {
    font-size: 38px;
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 24px;
    max-width: 480px;
  }
  .titulo span { color: #C9A84C; }

  .infos {
    display: flex;
    gap: 28px;
    margin-bottom: 28px;
  }
  .info-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .info-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }
  .info-valor {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
  }

  .divisor {
    width: 40px;
    height: 2px;
    background: #C9A84C;
    margin-bottom: 28px;
    opacity: 0.5;
  }

  .apresentado {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
  }
  .apresentado strong {
    color: rgba(255,255,255,0.85);
    font-weight: 600;
  }

  /* PREÇO — canto direito */
  .preco-bloco {
    position: absolute;
    right: 56px;
    bottom: 48px;
    text-align: right;
  }
  .preco-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 4px;
  }
  .preco-valor {
    font-size: 48px;
    font-weight: 800;
    color: #C9A84C;
    line-height: 1;
  }
  .preco-valor sup {
    font-size: 22px;
    font-weight: 600;
    vertical-align: super;
    margin-right: 2px;
  }
  .preco-garantia {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    margin-top: 6px;
  }
</style>
</head>
<body>

<div class="banner">
  <div class="circulo2"></div>

  <div class="tag">Evento ao vivo</div>

  <div class="titulo">
    Masterclass<br>
    <span>Reconstrução a Dois</span>
  </div>

  <div class="infos">
    <div class="info-item">
      <span class="info-label">Data</span>
      <span class="info-valor">26 de abril</span>
    </div>
    <div class="info-item">
      <span class="info-label">Formato</span>
      <span class="info-valor">Ao vivo via Zoom</span>
    </div>
  </div>

  <div class="divisor"></div>

  <div class="apresentado">
    Apresentado por <strong>César Augusto</strong> e <strong>Thais Ayumi</strong>
  </div>

  <div class="preco-bloco">
    <div class="preco-label">Valor</div>
    <div class="preco-valor"><sup>R$</sup>97</div>
    <div class="preco-garantia">Acesso imediato ao grupo</div>
  </div>
</div>

</body>
</html>
